<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTT Client</title>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1210; --panel: #141b18; --line: #263129; --text: #d8e4dd;
    --muted: #6f8079; --accent: #ff7a3c; --accent-dim: #5c3520;
    --live: #3ddc84; --danger: #ff5c5c; --mono: "SF Mono", "Menlo", "Consolas", monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; min-height: 100dvh; background: var(--bg); color: var(--text);
    font-family: var(--mono); display: flex; align-items: flex-start; justify-content: center; padding: 16px;
  }
  @media (min-width: 480px) { body { align-items: center; padding: 24px; } }
  .unit { width: 100%; max-width: 420px; background: var(--panel); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
  .unit-header { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; justify-content: space-between; }
  .unit-header .label { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  .unit-header .channel { font-size: 13px; color: var(--text); }
  .status-row { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-bottom: 1px solid var(--line); font-size: 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.connected { background: var(--live); box-shadow: 0 0 6px var(--live); }
  .dot.error { background: var(--danger); }
  .status-text { color: var(--muted); flex: 1; }
  .section { padding: 16px 18px; display: grid; gap: 10px; border-bottom: 1px solid var(--line); }
  .hidden { display: none !important; }
  .field { display: grid; gap: 4px; }
  .field label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .field input { background: var(--bg); border: 1px solid var(--line); color: var(--text); font-family: var(--mono); font-size: 16px; padding: 8px 10px; border-radius: 2px; outline: none; width: 100%; min-width: 0; }
  .field input:focus { border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; padding: 9px 0; border-radius: 2px; cursor: pointer; text-transform: uppercase; }
  button:hover { background: var(--accent-dim); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.secondary { border-color: var(--line); color: var(--muted); }
  button.secondary:hover { background: rgba(255,255,255,0.04); }
  .divider { text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
  .user-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .user-row .name { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .invite-box { background: var(--bg); border: 1px dashed var(--accent); border-radius: 2px; padding: 10px; font-size: 13px; display: grid; gap: 6px; }
  .invite-box .code { font-size: 18px; letter-spacing: 0.15em; color: var(--accent); }
  .talk-area { padding: 26px 18px 24px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .ptt-btn { width: 160px; height: 160px; border-radius: 50%; border: 2px solid var(--line); background: radial-gradient(circle at 35% 30%, #1c2620, #10160f); color: var(--muted); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: border-color 120ms, color 120ms, transform 80ms; user-select: none; -webkit-user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
  @media (min-width: 480px) { .ptt-btn { width: 140px; height: 140px; font-size: 12px; } }
  .ptt-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ptt-btn.active { border-color: var(--accent); color: var(--accent); transform: scale(0.97); box-shadow: 0 0 24px -4px var(--accent); }
  .hint { font-size: 11px; color: var(--muted); text-align: center; }
  .talkers { width: 100%; padding: 14px 18px 18px; border-top: 1px solid var(--line); }
  .talkers .label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .talker-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 22px; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  .chip.live { border-color: var(--live); color: var(--live); }
  .chip-actions { display: inline-flex; gap: 4px; }
  .chip-btn { border: none; background: none; padding: 0; font-size: 10px; letter-spacing: 0; text-transform: none; cursor: pointer; color: inherit; opacity: 0.7; text-decoration: underline; }
  .chip-btn:hover { opacity: 1; background: none; }
  .chip-btn.danger { color: var(--danger); }
  .log { max-height: 130px; overflow-y: auto; padding: 10px 18px; border-top: 1px solid var(--line); font-size: 10px; color: var(--muted); line-height: 1.6; }
  .log div { white-space: pre-wrap; word-break: break-all; }
  /* [Phase5] チャット */
  .chat-list { max-height: 180px; overflow-y: auto; display: grid; gap: 6px; margin-bottom: 10px; font-size: 12px; }
  .chat-list .msg { white-space: pre-wrap; word-break: break-word; }
  .chat-list .msg.me { color: var(--live); }
  .chat-row { display: flex; gap: 6px; }
  .chat-row input { flex: 1; background: var(--bg); border: 1px solid var(--line); color: var(--text); font-family: var(--mono); font-size: 14px; padding: 8px 10px; border-radius: 2px; outline: none; min-width: 0; }
  .chat-row input:focus { border-color: var(--accent); }
  .chat-row button { width: auto; padding: 9px 14px; }
</style>
</head>
<body>

<div class="unit">
  <div class="unit-header">
    <span class="label">PTT Client</span>
    <span class="channel" id="channelLabel">未接続</span>
  </div>
  <div class="status-row">
    <span class="dot" id="statusDot"></span>
    <span class="status-text" id="statusText">サインインしていません</span>
  </div>

  <!-- ① サインイン前: Google/Appleサインインボタンのみ -->
  <div class="section" id="authSection">
    <div class="field">
      <label for="tokenServerUrl">トークンサーバーURL</label>
      <input id="tokenServerUrl" value="https://ptt-token-server-rnn4fqay3a-an.a.run.app" />
    </div>
    <div class="field">
      <label for="livekitUrl">LiveKit URL (wss://)</label>
      <input id="livekitUrl" value="wss://ubunifu-talk-wy19xst3.livekit.cloud" />
    </div>
    <button id="googleSignInBtn">Googleでサインイン</button>
    <button id="appleSignInBtn">Appleでサインイン</button>
  </div>

  <!-- ② サインイン後・未入室: ルーム作成 or 招待コードで参加 -->
  <div class="section hidden" id="roomSection">
    <div class="user-row">
      <span class="name" id="userNameLabel"></span>
      <button class="secondary" id="signOutBtn" style="width:auto; padding:6px 10px;">サインアウト</button>
    </div>

    <button id="createRoomBtn">新しいルームを作成する</button>

    <div class="divider">— または —</div>

    <div class="row2">
      <div class="field">
        <label for="joinRoomId">ルームID</label>
        <input id="joinRoomId" placeholder="招待された側が入力" />
      </div>
      <div class="field">
        <label for="joinInviteCode">招待コード</label>
        <input id="joinInviteCode" placeholder="8文字のコード" />
      </div>
    </div>
    <button id="joinRoomBtn">招待コードで参加する</button>

    <div class="divider hidden" id="savedRoomsDivider">— 最近使ったルーム —</div>
    <div id="savedRoomsList" style="display:grid; gap:6px;"></div>
  </div>

  <!-- 招待コード表示: ルーム作成者に対して、ルーム選択画面/通話画面のどちらでも
       見えるよう、roomSection/voiceSectionとは独立した要素にしている -->
  <div class="invite-box hidden" id="inviteBox">
    <span>このルームの招待コード(参加者に共有してください):</span>
    <span class="code" id="inviteCodeText"></span>
    <span>ルームID: <span id="inviteRoomIdText"></span></span>
  </div>

  <!-- ③ 入室後: PTT本体 -->
  <div class="section hidden" id="voiceSection" style="border-bottom:none; padding-bottom:0;">
    <button class="secondary" id="leaveRoomBtn">ルームを退出する</button>
  </div>
  <div class="talk-area hidden" id="talkArea">
    <button class="ptt-btn" id="pttBtn" disabled>押して送話</button>
    <div class="hint">ボタンを押している間だけ音声が送信されます</div>
  </div>
  <div class="talkers hidden" id="talkerSection">
    <div class="label">参加者(緑=送話中)</div>
    <div class="talker-list" id="talkerList"></div>
  </div>
  <!-- [Phase5] テキストチャット。書き込みはtoken-server経由、配信はFirestoreの
       リアルタイムリスナー(onSnapshot)に任せる(BAN即時反映と同じ設計パターン)。 -->
  <div class="talkers hidden" id="chatSection">
    <div class="label">チャット</div>
    <div class="chat-list" id="chatList"></div>
    <div class="chat-row">
      <input id="chatInput" placeholder="メッセージを入力" maxlength="2000" />
      <button id="chatSendBtn">送信</button>
    </div>
  </div>
  <div class="talkers hidden" id="statsSection">
    <div class="label">音声統計 (RTP実測値。1.5秒ごと更新)</div>
    <div id="statsList" style="font-size:11px; color:var(--muted); display:grid; gap:4px;">— なし —</div>
  </div>
  <div class="log" id="log"></div>
</div>

<!-- 受信音声の再生先。画面には出さないがDOMに存在させる必要がある -->
<div id="remoteAudioContainer" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  OAuthProvider,
  signInWithPopup,
  signOut as firebaseSignOut,
  onAuthStateChanged,
} from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  onSnapshot,
  collection,
  query,
  orderBy,
  limit,
} from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

// [Phase1: Firebase Auth]
// このアプリで実際に使っているFirebaseプロジェクトの設定(公開情報。秘密鍵ではない)。
// dev-tools/get-firebase-token.html と同じプロジェクトを指している。
const firebaseConfig = {
  apiKey: "AIzaSyD8TErGVlJFrn3Sldgr3junEvFufz_7wW0",
  authDomain: "fir-rtc-de1f4.firebaseapp.com",
  projectId: "fir-rtc-de1f4",
};

const firebaseApp = initializeApp(firebaseConfig);
const firebaseAuth = getAuth(firebaseApp);
const firestoreDb = getFirestore(firebaseApp);

// サーバー側の token.js は ttl:'10m' 固定で発行するため、クライアント側もこれに合わせる。
// (サーバーのレスポンスに expiresIn は含まれていないため、既知の固定値としてハードコードしている)
const TOKEN_TTL_SECONDS = 600;

const { Room, RoomEvent, Track, ConnectionState } = LivekitClient;

let currentUser = null;
let currentRoomId = null;
let currentInviteCode = null; // 自分がルーム作成者の場合のみセットされる、共有用の招待コード
let myRole = null; // 'owner' | 'moderator' | 'member' (このルームでの自分のロール)
let banListenerUnsub = null; // 自分がBANされたことを即座に検知するリアルタイムリスナーの解除関数
let chatListenerUnsub = null; // [Phase5] チャット履歴のリアルタイムリスナーの解除関数
let room = null;
let localMicTrack = null;
let statsTimer = null;
let tokenRefreshTimer = null;
let manuallyDisconnected = false;
let roomConnected = false;
// サーバー(routes/talk.js)がLiveKitのRoom Metadataに書き込む { currentTalker, updatedAt } を
// RoomMetadataChangedイベント経由で反映する。自分以外がロックを保持している間はPTTボタンを無効化する。
let currentTalkerUid = null;
let talkHeartbeatTimer = null; // ロック保持中、失効(TTL)前に延長し続けるためのタイマー
const TALK_LOCK_HEARTBEAT_MS = 5000; // サーバー側 LOCK_TTL_MS(15s) より十分短い間隔で延長する
// identity(uid) -> { name: string, muted: boolean } — 送話中の判定と、BAN/通報の対象指定の両方に使う
const participants = new Map();
const remoteAudioTracks = new Map();

const $ = (id) => document.getElementById(id);
const logEl = $('log');
const statusDot = $('statusDot');
const statusText = $('statusText');
const channelLabel = $('channelLabel');
const authSection = $('authSection');
const roomSection = $('roomSection');
const voiceSection = $('voiceSection');
const talkArea = $('talkArea');
const talkerSection = $('talkerSection');
const chatSection = $('chatSection');
const chatList = $('chatList');
const chatInput = $('chatInput');
const chatSendBtn = $('chatSendBtn');
const statsSection = $('statsSection');
const inviteBox = $('inviteBox');
const savedRoomsDivider = $('savedRoomsDivider');
const savedRoomsList = $('savedRoomsList');
const pttBtn = $('pttBtn');
const talkerList = $('talkerList');
const remoteAudioContainer = $('remoteAudioContainer');
const statsList = $('statsList');

function log(msg) {
  const line = document.createElement('div');
  const t = new Date().toLocaleTimeString();
  line.textContent = `[${t}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(state, text) {
  statusDot.className = 'dot' + (state ? ' ' + state : '');
  statusText.textContent = text;
}

// PTTボタンの disabled は「ルームに接続しているか」と「他人が発話ロックを
// 保持中か」の2条件で決まるため、呼び出し箇所を分散させず一箇所にまとめる。
function updatePttButtonState() {
  const someoneElseIsTalking = currentTalkerUid && currentTalkerUid !== currentUser?.uid;
  pttBtn.disabled = !roomConnected || someoneElseIsTalking;
  if (someoneElseIsTalking) {
    const name = participants.get(currentTalkerUid)?.name || currentTalkerUid;
    pttBtn.textContent = `${name} が送話中`;
  } else if (!pttBtn.classList.contains('active')) {
    pttBtn.textContent = '押して送話';
  }
}

// ---------- 画面遷移 ----------

function showAuthScreen() {
  authSection.classList.remove('hidden');
  roomSection.classList.add('hidden');
  voiceSection.classList.add('hidden');
  talkArea.classList.add('hidden');
  talkerSection.classList.add('hidden');
  chatSection.classList.add('hidden');
  statsSection.classList.add('hidden');
  channelLabel.textContent = '未接続';
  setStatus(null, 'サインインしていません');
}

function showRoomSelectionScreen() {
  authSection.classList.add('hidden');
  roomSection.classList.remove('hidden');
  voiceSection.classList.add('hidden');
  talkArea.classList.add('hidden');
  talkerSection.classList.add('hidden');
  chatSection.classList.add('hidden');
  statsSection.classList.add('hidden');
  channelLabel.textContent = '未接続';
  setStatus(null, 'ルーム未選択');
  $('userNameLabel').textContent = currentUser.displayName || currentUser.email || currentUser.uid;
}

function showVoiceScreen() {
  authSection.classList.add('hidden');
  roomSection.classList.add('hidden');
  voiceSection.classList.remove('hidden');
  talkArea.classList.remove('hidden');
  talkerSection.classList.remove('hidden');
  chatSection.classList.remove('hidden');
  statsSection.classList.remove('hidden');
}

// roomSection/voiceSectionのどちらが表示中でも、招待コードがある間は表示し続ける
function renderInviteBox() {
  if (currentInviteCode && currentRoomId) {
    $('inviteCodeText').textContent = currentInviteCode;
    $('inviteRoomIdText').textContent = currentRoomId;
    inviteBox.classList.remove('hidden');
  } else {
    inviteBox.classList.add('hidden');
  }
}

// ---------- 最近使ったルーム(localStorage) ----------
// [設計方針]
// サーバー側にはルーム一覧を返すAPIが無く(招待制のため、そもそも「一覧」という概念が薄い)、
// あくまで「自分が過去に作成/参加したルームにワンタップで戻れる」ためのローカルな履歴として
// 実装する。複数のFirebaseアカウントで同じブラウザを使うケースを考慮し、
// uidごとに別のlocalStorageキーに保存する(サインアウト/別アカウントでの汚染を防ぐため)。

const MAX_SAVED_ROOMS = 20;

function savedRoomsKey() {
  return currentUser ? `pttSavedRooms:${currentUser.uid}` : null;
}

function loadSavedRooms() {
  const key = savedRoomsKey();
  if (!key) return [];
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function persistSavedRooms(rooms) {
  const key = savedRoomsKey();
  if (!key) return;
  try {
    localStorage.setItem(key, JSON.stringify(rooms));
  } catch (e) {
    log(`ルーム履歴の保存に失敗しました: ${e.message}`);
  }
}

/// ルームに作成/参加するたびに呼ぶ。同じroomIdが既にあれば更新して先頭に移動する。
function upsertSavedRoom(roomId, label, inviteCode) {
  if (!savedRoomsKey()) return;
  let rooms = loadSavedRooms().filter((r) => r.roomId !== roomId);
  rooms.unshift({ roomId, label, inviteCode: inviteCode || null, lastUsedAt: Date.now() });
  if (rooms.length > MAX_SAVED_ROOMS) rooms = rooms.slice(0, MAX_SAVED_ROOMS);
  persistSavedRooms(rooms);
  renderSavedRooms();
}

function removeSavedRoom(roomId) {
  const rooms = loadSavedRooms().filter((r) => r.roomId !== roomId);
  persistSavedRooms(rooms);
  renderSavedRooms();
}

function renderSavedRooms() {
  const rooms = loadSavedRooms();
  savedRoomsList.innerHTML = '';
  if (rooms.length === 0) {
    savedRoomsDivider.classList.add('hidden');
    return;
  }
  savedRoomsDivider.classList.remove('hidden');
  for (const r of rooms) {
    const row = document.createElement('div');
    row.className = 'user-row';

    const openBtn = document.createElement('button');
    openBtn.type = 'button';
    openBtn.className = 'secondary';
    openBtn.style.textAlign = 'left';
    openBtn.style.flex = '1';
    openBtn.textContent = `${r.label} (${r.roomId})`;
    openBtn.addEventListener('click', () => rejoinSavedRoom(r));

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'secondary';
    delBtn.style.width = 'auto';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeSavedRoom(r.roomId);
    });

    row.appendChild(openBtn);
    row.appendChild(delBtn);
    savedRoomsList.appendChild(row);
  }
}

/// 保存済みのルームを直接タップした場合: 招待コード検証(/rooms/:id/join)は経由せず、
/// 既にメンバーである前提でそのままトークン取得〜接続に進む。
/// (メンバーでなくなっていた場合 = BAN等 は /token が403を返すのでenterRoom側で弾かれる)
async function rejoinSavedRoom(saved) {
  currentInviteCode = saved.inviteCode || null;
  currentRoomId = saved.roomId; // renderInviteBox()がcurrentRoomIdも見るため、enterRoom前にセットしておく
  renderInviteBox();
  await enterRoom(saved.roomId);
}

// ---------- 認証 ----------

$('googleSignInBtn').addEventListener('click', async () => {
  try {
    await signInWithPopup(firebaseAuth, new GoogleAuthProvider());
  } catch (e) {
    log(`Googleサインインエラー: ${e.message}`);
  }
});

$('appleSignInBtn').addEventListener('click', async () => {
  try {
    // Firebase Console側でApple providerの設定(Service ID等)が済んでいる必要がある
    await signInWithPopup(firebaseAuth, new OAuthProvider('apple.com'));
  } catch (e) {
    log(`Appleサインインエラー: ${e.message}`);
  }
});

$('signOutBtn').addEventListener('click', async () => {
  if (room) await disconnectVoice();
  await firebaseSignOut(firebaseAuth);
});

onAuthStateChanged(firebaseAuth, (user) => {
  currentUser = user;
  if (user) {
    log(`サインイン中: ${user.displayName || user.email || user.uid}`);
    showRoomSelectionScreen();
  } else {
    log('未サインイン');
    showAuthScreen();
  }
  renderSavedRooms(); // savedRoomsKey()がcurrentUserを見るため、サインイン/アウトのどちらでも呼び直す
});

// ---------- トークンサーバーへの認証付きリクエスト ----------
// [Phase1] 全エンドポイントが Authorization: Bearer <Firebase IDトークン> を要求する。

async function authedFetch(path, options = {}) {
  if (!currentUser) throw new Error('サインインしていません');
  const idToken = await currentUser.getIdToken();
  const tokenServerUrl = $('tokenServerUrl').value.trim().replace(/\/$/, '');
  const res = await fetch(`${tokenServerUrl}${path}`, {
    ...options,
    headers: {
      ...(options.headers || {}),
      'Authorization': `Bearer ${idToken}`,
    },
  });
  if (!res.ok) {
    let err = {};
    try { err = await res.json(); } catch (e) { /* ignore */ }
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ---------- ルーム作成・参加 ----------

$('createRoomBtn').addEventListener('click', async () => {
  $('createRoomBtn').disabled = true;
  try {
    log('ルームを作成しています...');
    const data = await authedFetch('/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    log(`ルーム作成成功: roomId=${data.roomId}`);
    currentInviteCode = data.inviteCode;
    currentRoomId = data.roomId;
    renderInviteBox();
    upsertSavedRoom(data.roomId, '自分が作成したルーム', data.inviteCode);
    await enterRoom(data.roomId);
  } catch (e) {
    log(`ルーム作成エラー: ${e.message}`);
  } finally {
    $('createRoomBtn').disabled = false;
  }
});

$('joinRoomBtn').addEventListener('click', async () => {
  const roomId = $('joinRoomId').value.trim();
  const inviteCode = $('joinInviteCode').value.trim();
  if (!roomId || !inviteCode) {
    log('ルームIDと招待コードを入力してください');
    return;
  }
  $('joinRoomBtn').disabled = true;
  try {
    log('ルームに参加しています...');
    await authedFetch(`/rooms/${encodeURIComponent(roomId)}/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ inviteCode }),
    });
    log('ルーム参加成功');
    currentInviteCode = inviteCode; // 参加者自身が入力した招待コードをそのまま保持し、以後も表示できるようにする
    currentRoomId = roomId;
    renderInviteBox();
    upsertSavedRoom(roomId, '招待コードで参加したルーム', inviteCode);
    await enterRoom(roomId);
  } catch (e) {
    log(`ルーム参加エラー: ${e.message}`);
  } finally {
    $('joinRoomBtn').disabled = false;
  }
});

$('leaveRoomBtn').addEventListener('click', () => {
  disconnectVoice();
});

// ---------- LiveKit接続 ----------

async function enterRoom(roomId) {
  currentRoomId = roomId;
  manuallyDisconnected = false;
  renderInviteBox(); // currentRoomId確定直後に再描画しておく(呼び出し順序ミスへの保険)
  showVoiceScreen();
  channelLabel.textContent = `room: ${roomId}`;
  setStatus(null, 'トークン取得中...');

  try {
    await loadMyRole(roomId);
    startBanListener(roomId);
    startChatListener(roomId);
    const data = await authedFetch(`/token?room=${encodeURIComponent(roomId)}`);
    await connectLiveKit(data.token);
    scheduleTokenRefresh();
  } catch (e) {
    log(`トークン取得エラー: ${e.message}`);
    setStatus('error', 'トークン取得失敗');
  }
}

// 自分のmembersドキュメントを読み、BAN/通報ボタンの表示可否に使うroleを取得する。
// firestore.rulesで「自分のuidのドキュメントのみ読み取り可」に限定しているため、
// これはクライアントから直接Firestoreを読む唯一の箇所。
async function loadMyRole(roomId) {
  try {
    const snap = await getDoc(doc(firestoreDb, 'rooms', roomId, 'members', currentUser.uid));
    myRole = snap.exists() ? (snap.data().role || 'member') : null;
  } catch (e) {
    log(`ロール取得エラー: ${e.message}`);
    myRole = null;
  }
}

// [BAN即時反映] 自分のmembersドキュメントをリアルタイム監視し、statusが'banned'に
// なった瞬間にルームから強制退出させる。BAN自体の強制力はLiveKit側の即時キックが担うが、
// UI側でも「排除されました」と即座に表示するための補助。
function startBanListener(roomId) {
  stopBanListener();
  banListenerUnsub = onSnapshot(
    doc(firestoreDb, 'rooms', roomId, 'members', currentUser.uid),
    (snap) => {
      if (snap.exists() && snap.data().status === 'banned' && !manuallyDisconnected) {
        log('このルームから排除されました');
        setStatus('error', '排除されました');
        disconnectVoice();
      }
    },
    (e) => log(`BAN監視エラー: ${e.message}`)
  );
}

function stopBanListener() {
  if (banListenerUnsub) {
    banListenerUnsub();
    banListenerUnsub = null;
  }
}

// ---------- [Phase5] テキストチャット ----------
// 書き込みはtoken-server(/rooms/:roomId/messages)経由のみ。配信・履歴表示は
// Firestoreのリアルタイムリスナー(onSnapshot)に任せる(BAN監視と同じ設計パターン)。
// BANされてstatusが'banned'になった瞬間、firestore.rules側で読み取り権限自体を失う。

function startChatListener(roomId) {
  stopChatListener();
  const q = query(
    collection(firestoreDb, 'rooms', roomId, 'messages'),
    orderBy('createdAt', 'desc'),
    limit(200)
  );
  chatListenerUnsub = onSnapshot(
    q,
    (snap) => {
      const docs = snap.docs.map((d) => d.data()).reverse(); // 古い→新しい順に並べ直す
      renderChatMessages(docs);
    },
    (e) => log(`チャット取得エラー: ${e.message}`)
  );
}

function stopChatListener() {
  if (chatListenerUnsub) {
    chatListenerUnsub();
    chatListenerUnsub = null;
  }
  chatList.innerHTML = '';
}

function renderChatMessages(docs) {
  const atBottom = chatList.scrollTop + chatList.clientHeight >= chatList.scrollHeight - 4;
  chatList.innerHTML = '';
  for (const m of docs) {
    const row = document.createElement('div');
    row.className = 'msg' + (m.uid === currentUser?.uid ? ' me' : '');
    const time = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleTimeString() : '';
    row.textContent = `[${time}] ${m.displayName}: ${m.text}`;
    chatList.appendChild(row);
  }
  if (atBottom) chatList.scrollTop = chatList.scrollHeight;
}

async function sendChatMessage() {
  const text = chatInput.value.trim();
  if (!text || !currentRoomId) return;
  chatInput.value = '';
  try {
    await authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
  } catch (e) {
    log(`メッセージ送信エラー: ${e.message}`);
    chatInput.value = text; // 失敗時は入力内容を戻す
  }
}

chatSendBtn.addEventListener('click', sendChatMessage);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) sendChatMessage();
});

async function connectLiveKit(token) {
  const livekitUrl = $('livekitUrl').value.trim();

  room = new Room({
    audioCaptureDefaults: { echoCancellation: true, noiseSuppression: true },
  });

  room
    .on(RoomEvent.ConnectionStateChanged, (state) => {
      log(`接続状態: ${state}`);
      if (state === ConnectionState.Disconnected && !manuallyDisconnected) {
        setStatus('error', '切断されました');
        roomConnected = false;
        stopTalkHeartbeat();
        currentTalkerUid = null;
        updatePttButtonState();
        participants.clear();
        renderParticipants();
      }
    })
    .on(RoomEvent.RoomMetadataChanged, (metadata) => {
      // routes/talk.js が RoomServiceClient.updateRoomMetadata() で書き込む
      // { currentTalker, updatedAt } を反映する。他人が発話中ならPTTボタンを無効化する。
      try {
        const parsed = metadata ? JSON.parse(metadata) : {};
        currentTalkerUid = parsed.currentTalker || null;
      } catch (e) {
        currentTalkerUid = null;
      }
      log(`[診断] メタデータ更新受信: currentTalker=${currentTalkerUid ?? 'null'}`);
      updatePttButtonState();
    })
    .on(RoomEvent.ParticipantConnected, (p) => {
      log(`参加: ${p.name || p.identity}`);
      participants.set(p.identity, { name: p.name || p.identity, muted: true });
      renderParticipants();
    })
    .on(RoomEvent.ParticipantDisconnected, (p) => {
      log(`退出: ${p.name || p.identity}`);
      participants.delete(p.identity);
      renderParticipants();
    })
    .on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
      if (track.kind === Track.Kind.Audio) {
        const el = track.attach();
        remoteAudioContainer.appendChild(el);
        remoteAudioTracks.set(participant.identity, track);
        log(`音声トラック購読開始: ${participant.name || participant.identity}`);
      }
    })
    .on(RoomEvent.TrackUnsubscribed, (track, pub, participant) => {
      track.detach().forEach((el) => el.remove());
      remoteAudioTracks.delete(participant.identity);
    })
    .on(RoomEvent.TrackMuted, (pub, participant) => {
      if (pub.kind === Track.Kind.Audio && participants.has(participant.identity)) {
        participants.get(participant.identity).muted = true;
        renderParticipants();
      }
    })
    .on(RoomEvent.TrackUnmuted, (pub, participant) => {
      if (pub.kind === Track.Kind.Audio && participants.has(participant.identity)) {
        participants.get(participant.identity).muted = false;
        renderParticipants();
      }
    });

  await room.connect(livekitUrl, token);
  log(`ルーム接続完了: room=${currentRoomId}`);
  await room.localParticipant.setMicrophoneEnabled(false);
  roomConnected = true;

  // 接続時点で既に誰かが発話ロックを保持していた場合に備え、room.metadataから初期状態を読み込む
  // (RoomMetadataChangedは「変化した瞬間」のイベントなので、接続前からの既存状態は別途拾う必要がある)。
  try {
    const parsed = room.metadata ? JSON.parse(room.metadata) : {};
    currentTalkerUid = parsed.currentTalker || null;
  } catch (e) {
    currentTalkerUid = null;
  }

  // 接続時点ですでに他の参加者がいる場合、ParticipantConnectedイベントは発火しないため
  // room.remoteParticipants から初期状態を取り込む
  participants.clear();
  for (const p of room.remoteParticipants.values()) {
    const pub = p.getTrackPublication(Track.Source.Microphone);
    participants.set(p.identity, { name: p.name || p.identity, muted: !pub || pub.isMuted });
  }
  renderParticipants();

  setStatus('connected', `接続中 (room=${currentRoomId})`);
  updatePttButtonState();
  startStatsPolling();
}

// [自動再取得] TOKEN_TTL_SECONDSの90%が経過したら新トークンを取得し再接続する。
// LiveKitは接続中のトークン差し替えができないため、disconnect→再connectで対応する
// (PTT用途では瞬断は許容範囲という前提の簡易実装)。
function scheduleTokenRefresh() {
  if (tokenRefreshTimer) clearTimeout(tokenRefreshTimer);
  const refreshInMs = TOKEN_TTL_SECONDS * 0.9 * 1000;
  tokenRefreshTimer = setTimeout(async () => {
    if (!room || manuallyDisconnected) return;
    log('トークン有効期限が近いため再接続します');
    try {
      const data = await authedFetch(`/token?room=${encodeURIComponent(currentRoomId)}`);
      await room.disconnect();
      await room.connect($('livekitUrl').value.trim(), data.token);
      await room.localParticipant.setMicrophoneEnabled(false);
      log('トークン更新・再接続に成功しました');
      scheduleTokenRefresh();
    } catch (e) {
      log(`トークン更新エラー: ${e.message}`);
      setStatus('error', 'トークン更新失敗');
    }
  }, refreshInMs);
}

async function disconnectVoice() {
  manuallyDisconnected = true;
  stopBanListener();
  stopChatListener();
  stopTalkHeartbeat();
  // 自分がロックを保持したまま切断すると、サーバー側はTTL(15秒)経過まで
  // 他の人をブロックし続けてしまうため、ベストエフォートで明示的に解放しておく。
  // (失敗しても実害はTTL経過まで待つだけなので、エラーは握りつぶしてよい)
  if (currentRoomId) {
    authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/talk/stop`, { method: 'POST' }).catch(() => {});
  }
  if (tokenRefreshTimer) {
    clearTimeout(tokenRefreshTimer);
    tokenRefreshTimer = null;
  }
  if (room) {
    await room.disconnect();
    room = null;
  }
  remoteAudioContainer.innerHTML = '';
  remoteAudioTracks.clear();
  localMicTrack = null;
  participants.clear();
  renderParticipants();
  stopStatsPolling();
  roomConnected = false;
  currentTalkerUid = null;
  currentRoomId = null;
  currentInviteCode = null;
  renderInviteBox(); // 退出後は招待コード欄を消す(呼ばないと直前の表示が残り続ける)
  myRole = null;
  showRoomSelectionScreen();
}

function renderParticipants() {
  talkerList.innerHTML = '';
  if (participants.size === 0) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = '— なし —';
    talkerList.appendChild(chip);
    return;
  }
  for (const [uid, info] of participants.entries()) {
    const chip = document.createElement('span');
    chip.className = 'chip' + (info.muted ? '' : ' live');

    const nameSpan = document.createElement('span');
    nameSpan.textContent = info.name;
    chip.appendChild(nameSpan);

    const actions = document.createElement('span');
    actions.className = 'chip-actions';

    const reportBtn = document.createElement('button');
    reportBtn.type = 'button';
    reportBtn.className = 'chip-btn';
    reportBtn.textContent = '通報';
    reportBtn.addEventListener('click', () => reportParticipant(uid, info.name));
    actions.appendChild(reportBtn);

    // BANはowner/moderatorのみに表示する
    if (myRole === 'owner' || myRole === 'moderator') {
      const banBtn = document.createElement('button');
      banBtn.type = 'button';
      banBtn.className = 'chip-btn danger';
      banBtn.textContent = 'BAN';
      banBtn.addEventListener('click', () => banParticipant(uid, info.name));
      actions.appendChild(banBtn);
    }

    chip.appendChild(actions);
    talkerList.appendChild(chip);
  }
}
renderParticipants();

// ---------- BAN / 通報 ----------

async function banParticipant(targetUid, displayName) {
  if (!confirm(`${displayName} をこのルームからBANしますか?\nこの操作は取り消せません。`)) return;
  try {
    await authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/members/${encodeURIComponent(targetUid)}/ban`, {
      method: 'POST',
    });
    log(`BANしました: ${displayName}`);
    // LiveKit側の即時キックによりParticipantDisconnectedイベントが発火し、
    // participants からも自動的に消える
  } catch (e) {
    log(`BANエラー: ${e.message}`);
  }
}

async function reportParticipant(reportedUid, displayName) {
  const reason = prompt(`${displayName} を通報する理由を入力してください`, '');
  if (reason === null) return; // キャンセル
  if (!reason.trim()) {
    log('通報理由が空のため送信を中止しました');
    return;
  }
  try {
    await authedFetch('/reports', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomId: currentRoomId, reportedUid, reason: reason.trim() }),
    });
    log(`通報を送信しました: ${displayName}`);
  } catch (e) {
    log(`通報エラー: ${e.message}`);
  }
}

// ---------- 音声統計 ----------

async function updateStats() {
  const lines = [];
  for (const [identity, track] of remoteAudioTracks.entries()) {
    try {
      const report = await track.getRTCStatsReport();
      let bytesReceived = null;
      let packetsReceived = null;
      report.forEach((v) => {
        if (v.type === 'inbound-rtp' && (v.kind === 'audio' || v.mediaType === 'audio')) {
          bytesReceived = v.bytesReceived ?? bytesReceived;
          packetsReceived = v.packetsReceived ?? packetsReceived;
        }
      });
      lines.push(`↓ ${identity}: ${bytesReceived ?? '?'} bytes / ${packetsReceived ?? '?'} pkts`);
    } catch (e) {
      lines.push(`↓ ${identity}: stats取得失敗 (${e.message})`);
    }
  }
  if (localMicTrack) {
    try {
      const report = await localMicTrack.getRTCStatsReport();
      let bytesSent = null;
      report.forEach((v) => {
        if (v.type === 'outbound-rtp' && (v.kind === 'audio' || v.mediaType === 'audio')) {
          bytesSent = v.bytesSent ?? bytesSent;
        }
      });
      lines.push(`↑ 自分(送信中): ${bytesSent ?? '?'} bytes`);
    } catch (e) {
      lines.push(`↑ 自分: stats取得失敗 (${e.message})`);
    }
  }
  statsList.innerHTML = lines.length ? lines.map((l) => `<div>${l}</div>`).join('') : '— なし —';
}

function startStatsPolling() {
  if (statsTimer) return;
  statsTimer = setInterval(updateStats, 1500);
}

function stopStatsPolling() {
  if (statsTimer) {
    clearInterval(statsTimer);
    statsTimer = null;
  }
  statsList.innerHTML = '— なし —';
}

// ---------- PTT (送話ロック連携) ----------

let pttHeld = false; // 現在ボタンが押されているか(startTalkingのawait中に離された場合を検知するため)
let talkRequestToken = 0; // startTalking呼び出しごとに増分し、古い呼び出しの結果を無視するために使う

function stopTalkHeartbeat() {
  if (talkHeartbeatTimer) {
    clearInterval(talkHeartbeatTimer);
    talkHeartbeatTimer = null;
  }
}

function startTalkHeartbeat() {
  stopTalkHeartbeat();
  talkHeartbeatTimer = setInterval(async () => {
    if (!currentRoomId) return;
    try {
      await authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/talk/heartbeat`, { method: 'POST' });
    } catch (e) {
      // サーバー側で最大発話時間(MAX_HOLD_MS)を超えた等、ロックを失った場合はここに来る。
      // 本来は次のRoomMetadataChangedでUIも追従するが、念のため即座に強制的に送話を止める。
      log(`発話ロックの延長に失敗しました。送話を終了します: ${e.message}`);
      await stopTalking(true);
    }
  }, TALK_LOCK_HEARTBEAT_MS);
}

async function startTalking() {
  if (!room || pttBtn.disabled) return;
  pttHeld = true;
  const myToken = ++talkRequestToken;

  try {
    await authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/talk/start`, { method: 'POST' });
  } catch (e) {
    // 他人が発話中(409 talk_locked)など。RoomMetadataChangedでほぼ同時にボタンも
    // 無効化されるはずだが、競合(ほぼ同時押下)によるレースは起こりうるため、ここでも弾く。
    log(`発話を開始できませんでした: ${e.message}`);
    return;
  }

  // [レース対策] talk/start の応答待ち(Cloud Runのコールドスタート等で1秒近くかかることがある)の
  // 間にボタンが離されていた場合、ここで送話を開始してしまうと「離したのに喋り続ける」状態になる。
  // ロックは既に取得できてしまっているので、使わないままサーバー側に解放を伝える。
  if (!pttHeld || myToken !== talkRequestToken) {
    authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/talk/stop`, { method: 'POST' }).catch(() => {});
    return;
  }

  pttBtn.classList.add('active');
  pttBtn.textContent = '送話中';
  try {
    await room.localParticipant.setMicrophoneEnabled(true);
    const pub = room.localParticipant.getTrackPublication(Track.Source.Microphone);
    localMicTrack = pub?.track ?? null;
    startTalkHeartbeat();
  } catch (e) {
    log(`マイク有効化エラー: ${e.message}`);
    pttBtn.classList.remove('active');
    authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/talk/stop`, { method: 'POST' }).catch(() => {});
  }
}

// forced=true は heartbeat失敗などサーバー側で既にロックを失っている場合に呼ばれる
// (この場合 talk/stop の呼び出し自体は冪等なので害はないが、二重に呼ぶ必要はない)。
async function stopTalking(forced = false) {
  pttHeld = false;
  talkRequestToken++; // 進行中のstartTalkingがあれば、その結果を無視させる
  if (!room) return;
  stopTalkHeartbeat();
  pttBtn.classList.remove('active');
  try {
    await room.localParticipant.setMicrophoneEnabled(false);
  } catch (e) {
    log(`マイク無効化エラー: ${e.message}`);
  } finally {
    localMicTrack = null;
  }
  if (!forced && currentRoomId) {
    authedFetch(`/rooms/${encodeURIComponent(currentRoomId)}/talk/stop`, { method: 'POST' }).catch(() => {});
  }
  updatePttButtonState();
}

pttBtn.addEventListener('mousedown', startTalking);
pttBtn.addEventListener('mouseup', () => stopTalking());
pttBtn.addEventListener('mouseleave', () => stopTalking());
pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTalking(); });
pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopTalking(); });
</script>
