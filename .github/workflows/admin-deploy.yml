name: Admin Dashboard Deploy

# admin-dashboard配下(またはhosting設定自体)の変更があった場合のみ動く。
# ptt-client用のweb-deploy.ymlと同じ考え方: モノレポなので他ディレクトリの
# 変更で無駄にデプロイが走らないようpathsで絞る。
on:
  push:
    branches: [main]
    paths:
      - "admin-dashboard/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/admin-deploy.yml"
  pull_request:
    paths:
      - "admin-dashboard/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/admin-deploy.yml"

concurrency:
  group: admin-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # [変更点] Vue+Vite化に伴い、旧html-validateチェックを廃止し、
  # ptt-client用web-deploy.ymlと同じ形で lint/test/build を必須条件にする。
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build (type-check + vite build)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-dist
          path: admin-dashboard/dist
          retention-days: 1

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dashboard-dist
          path: admin-dashboard/dist

      - name: Deploy to Firebase Hosting Preview Channel (admin target)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          target: admin
          entryPoint: .
          channelId: "pr-${{ github.event.number }}"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dashboard-dist
          path: admin-dashboard/dist

      - name: Deploy to Firebase Hosting (admin target, live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          target: admin
          entryPoint: .
          channelId: live
