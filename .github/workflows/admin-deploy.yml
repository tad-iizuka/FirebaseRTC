name: Admin Dashboard Deploy

# admin-dashboard配下(またはhosting設定自体)の変更があった場合のみ動く。
# ptt-client用のweb-deploy.ymlと同じ考え方: モノレポなので他ディレクトリの
# 変更で無駄にデプロイが走らないようpathsで絞る。
on:
  push:
    branches: [main]
    paths:
      - "admin-dashboard/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/admin-deploy.yml"
  pull_request:
    paths:
      - "admin-dashboard/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/admin-deploy.yml"

concurrency:
  group: admin-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 静的HTML/JSのみなのでビルドステップは無いが、
  # 最低限のリンク切れ・構文チェックとして軽い検証を挟む(web-deploy.ymlと同じ)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check index.html exists and is well-formed HTML
        run: |
          test -f admin-dashboard/public/index.html
          npx --yes html-validate admin-dashboard/public/index.html || true

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase Hosting Preview Channel (admin target)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          target: admin
          entryPoint: .
          channelId: "pr-${{ github.event.number }}"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase Hosting (admin target, live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          target: admin
          entryPoint: .
          channelId: live
