name: Web (ptt-client) Deploy

on:
  push:
    branches: [main]
    paths:
      - "ptt-client/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/web-deploy.yml"
  pull_request:
    paths:
      - "ptt-client/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/web-deploy.yml"

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # [変更点] 以前は静的HTML/JSをそのまま配信していたためビルドステップが無く、
  # index.htmlの構文チェックだけを行っていた。Vue+Vite化に伴い、lintとtestに加えて
  # ここで本番ビルド(vue-tsc + vite build)まで通すことをCIの必須条件にする
  # (以前のhtml-validateは、ビルド後のdist/index.htmlに対して意味のあるチェックには
  # ならないため廃止した)。
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ptt-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ptt-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build (type-check + vite build)
        run: npm run build

      # 後続のdeployジョブ(PR preview / production)で使い回すため、
      # ビルド成果物だけをartifactとして保存する。
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptt-client-dist
          path: ptt-client/dist
          retention-days: 1

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ptt-client-dist
          path: ptt-client/dist

      - name: Deploy to Firebase Hosting Preview Channel (client target)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          target: client
          entryPoint: .
          channelId: "pr-${{ github.event.number }}"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ptt-client-dist
          path: ptt-client/dist

      - name: Deploy to Firebase Hosting (client target, live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          target: client
          entryPoint: .
          channelId: live
