name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - "ptt-ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    paths:
      - "ptt-ios/**"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Xcode 26系はホストOSに macOS 26 を要求するため、macos-15ランナーでは
    # Simulatorサービスがまともに機能しない(CoreSimulatorServiceが接続できない)。
    # 本プロジェクトは IPHONEOS_DEPLOYMENT_TARGET = 26.5 を要求しているため、
    # macOS 26ベースのランナーを使う。
    runs-on: macos-26
    timeout-minutes: 30

    env:
      PROJECT: ptt-ios/ptt-ios.xcodeproj
      SCHEME: ptt-ios
      # actions/cache で復元・保存する対象を固定パスにするため明示的に指定する。
      # 指定しない場合、xcodebuildは実行のたびに ~/Library/Developer/Xcode/DerivedData 配下に
      # ハッシュ付きのランダムなサブディレクトリを作るため、キャッシュのpathと噛み合わない。
      DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData
      # PRやフォークからのビルドでも通るよう、CIでは署名を無効化する
      # (シミュレータ向けビルド/テストなので署名は不要)
      XCODE_FLAGS: >-
        CODE_SIGNING_ALLOWED=NO
        CODE_SIGNING_REQUIRED=NO
        CODE_SIGN_IDENTITY=""
        DEVELOPMENT_TEAM=""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # [キャッシュ方針]
      # SPMの取得先(パッケージのソース本体)と、コンパイル成果物(DerivedData)を
      # それぞれ別キーでキャッシュする:
      #   - SPMキャッシュ: Package.resolved のハッシュが変わらない限り再利用可能
      #     (依存バージョンが変わらなければダウンロード自体をスキップできる)
      #   - DerivedDataキャッシュ: ソースコード(.swift等)のハッシュもキーに含める。
      #     Swiftのビルドはインクリメンタルコンパイルに対応しているため、
      #     コード変更後もキャッシュがあれば差分だけの再コンパイルで済み、
      #     フルビルドよりかなり速くなる。restore-keysでSPM分だけでも
      #     部分一致すればゼロからよりはマシになるようフォールバックを用意する。
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
            ptt-ios/ptt-ios.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ptt-ios/ptt-ios.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ptt-ios/**/*.swift', 'ptt-ios/ptt-ios.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Info.plist / project.pbxproj が iOS 26.5 SDK を要求している。
          # macos-26ランナーの既定Xcodeは段階的に上がっていく途中のため
          # (執筆時点でSDKはiOS 26.4までの可能性がある。2026/7/21に既定が26.6へ)、
          # betaも含めて確実に最新を掴めるよう "latest"(betaを含む)を指定する。
          # 安定させたい場合は実際にランナーへSSHして確認したバージョンを
          # 'xx.x' の形で明示指定に変更すること。
          xcode-version: latest

      - name: Restore GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo "$GOOGLE_SERVICE_INFO" | base64 --decode > ptt-ios/ptt-ios/GoogleService-Info.plist

      - name: Show Xcode & SDK versions
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: List installed Xcode versions on this runner
        run: |
          echo "--- /Applications 内のXcode一覧 ---"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "見つかりませんでした"
          for app in /Applications/Xcode*.app; do
            [ -d "$app" ] || continue
            v=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app/Contents/Info.plist" 2>/dev/null)
            echo "$app -> $v"
          done

      - name: Warm up CoreSimulatorService
        run: |
          # -downloadPlatform が "Unable to connect to simulator" で落ちる既知の問題対策。
          # CoreSimulatorServiceが未起動のまま-downloadPlatformを呼ぶと失敗することがあるため、
          # 先にsimctlで軽くアクセスしてサービスを起動させておく。
          xcrun simctl list devicetypes >/dev/null 2>&1 || true
          sleep 3

      - name: Ensure iOS Simulator runtime is installed
        id: download_platform
        continue-on-error: true
        run: |
          # ランナーに、選択中のXcodeが要求するiOS Simulatorランタイムが
          # 入っていないことがあるため、明示的にダウンロードしておく。
          # (すでに入っている場合は即座に完了する)
          # ここが失敗しても、既存ランタイムだけで後続のdestination探索を試すため
          # ジョブ全体は止めない(continue-on-error)。
          xcodebuild -downloadPlatform iOS

      - name: Show installed runtimes (diagnostic)
        run: |
          echo "download step outcome: ${{ steps.download_platform.outcome }}"
          xcrun simctl list runtimes
          echo "--- 全destination一覧(このproject/scheme向け) ---"
          xcodebuild -showdestinations -project "$PROJECT" -scheme "$SCHEME" 2>&1 || true

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Pick available iOS Simulator
        id: sim
        run: |
          set -o pipefail
          # xcrun simctl list はシステム全体のランタイムを返してしまい、
          # 現在選択中のXcode/SDKでは実際にビルドできない機種を拾うことがある。
          # そのため、このproject/schemeに対して xcodebuild が
          # 「本当にビルド可能」と申告する destination だけを対象にする。
          xcodebuild -showdestinations -project "$PROJECT" -scheme "$SCHEME" 2>/dev/null \
            | tee /tmp/destinations.txt

          # 具体的なidを持つ iOS Simulator 行だけを抽出(プレースホルダーは除外)
          LINE=$(grep -E "platform:iOS Simulator" /tmp/destinations.txt | grep -v "Any iOS Simulator Device" | grep "id:" | head -1)

          if [ -z "$LINE" ]; then
            echo "::error::このschemeに対して有効なiOS Simulator destinationが見つかりませんでした。"
            echo "--- xcodebuild -showdestinations の出力 ---"
            cat /tmp/destinations.txt
            exit 1
          fi

          NAME=$(echo "$LINE" | sed -E 's/.*name:([^,}]+).*/\1/' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          OS=$(echo "$LINE" | sed -E 's/.*OS:([^,}]+).*/\1/' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          UDID=$(echo "$LINE" | sed -E 's/.*id:([^,}]+).*/\1/' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "os=$OS" >> "$GITHUB_OUTPUT"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator: name=$NAME os=$OS udid=$UDID"

      - name: Boot simulator explicitly and wait
        # [対策] xcodebuild test に暗黙でシミュレータを起動させると、初回ブート中に
        # DTServiceHub が SIGCONT(signal 19)の送信に失敗し
        # ("Failed to send signal 19 to process ... : 3")、テスト自体は失敗しないまま
        # アプリの起動だけが延々と(10分以上)待たされることがある。
        # 事前に明示的にbootしてbootstatusで「本当に起動完了した」ことを
        # 確認しておくことで、この不安定さを軽減する。
        run: |
          set -o pipefail
          UDID="${{ steps.sim.outputs.udid }}"
          if [ -z "$UDID" ]; then
            echo "::warning::simulatorのUDIDが取得できなかったため、明示的なbootはスキップします"
            exit 0
          fi
          echo "Booting simulator udid=$UDID ..."
          xcrun simctl bootstatus "$UDID" -b || xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl list devices | grep "$UDID" || true

      - name: Build (Debug, Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=${{ steps.sim.outputs.os }}" \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            $XCODE_FLAGS \
            | xcpretty

      - name: Unit Tests (ptt-iosTests)
        # [方針: A+C]
        # 以前は -scheme 単位で ptt-iosTests と ptt-iosUITests をまとめて実行していたが、
        # ptt-iosUITests は Xcode生成のボイラープレート(testExample/testLaunchPerformance)で
        # 実質的なカバレッジがゼロにもかかわらず、シミュレータのAccessibilityサブシステム
        # 初期化待ちで "Timed out while loading Accessibility." により頻繁にハングし、
        # ジョブ全体のtimeout-minutesを消費してしまっていた
        # (詳細: 2026-07-13 実行 https://github.com/tad-iizuka/FirebaseRTC/actions/runs/29232530654)。
        #
        # -only-testing:ptt-iosTests でホストアプリ内実行のロジックテストのみに絞ることで、
        # Accessibility待ちを経路から完全に排除し、実行時間・安定性の両方を改善する。
        # ptt-iosUITests は下記「UI Tests (SKIPPED)」を参照し、実質的なテストを書くタイミングで
        # 再度有効化すること。
        run: |
          set -o pipefail
          mkdir -p build/reports

          MAX_ATTEMPTS=2
          attempt=1
          until [ "$attempt" -gt "$MAX_ATTEMPTS" ]; do
            echo "=== xcodebuild test (ptt-iosTests) 実行 (試行 $attempt/$MAX_ATTEMPTS) ==="
            rm -rf TestResults.xcresult

            if xcodebuild test \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -only-testing:ptt-iosTests \
              -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=${{ steps.sim.outputs.os }}" \
              -configuration Debug \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -resultBundlePath TestResults.xcresult \
              $XCODE_FLAGS \
              | xcpretty --report junit --output build/reports/junit.xml; then
              echo "テスト成功(試行 $attempt)"
              exit 0
            fi

            echo "::warning::テスト失敗(試行 $attempt/$MAX_ATTEMPTS)。シミュレータのインフラ起因の可能性があるため再試行します"
            attempt=$((attempt + 1))

            if [ "$attempt" -le "$MAX_ATTEMPTS" ]; then
              # DTServiceHub/CoreSimulatorServiceが半端な状態のまま残っている可能性があるため、
              # 一度リセットしてから明示的に再起動する(単なる即時リトライだと同じ状態を
              # 引きずって再発しやすいため)。
              xcrun simctl shutdown "${{ steps.sim.outputs.udid }}" || true
              sleep 5
              xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b || xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
              xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b
            fi
          done

          echo "::error::テストが $MAX_ATTEMPTS 回とも失敗しました"
          exit 1

      # [UI Tests (SKIPPED)]
      # ptt-iosUITests は現状 Xcode生成のボイラープレートのみで実質的なカバレッジがなく、
      # 上記の通りAccessibility初期化待ちでCIを不安定化させる要因になっていたため、
      # 意図的にCIの対象から外している(-only-testing:ptt-iosTests で除外済み)。
      #
      # 実際のPTT機能を検証するUIテストを書き始める際は、以下を追加で行うこと:
      #   1. 別ステップとして
      #      xcodebuild test -only-testing:ptt-iosUITests ... を追加する
      #   2. boot前に `xcrun simctl erase <udid>` を挟み、Accessibility/TCC状態を含めて
      #      完全にクリーンな状態から起動させる(既知の緩和策)
      #   3. Accessibility初期化には数分かかることがあるため、timeout-minutesの余裕も
      #      合わせて見直す

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: build/reports/junit.xml
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
          retention-days: 14
