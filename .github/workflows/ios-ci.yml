name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - "ptt-ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    paths:
      - "ptt-ios/**"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    env:
      PROJECT: ptt-ios/ptt-ios.xcodeproj
      SCHEME: ptt-ios
      # PRやフォークからのビルドでも通るよう、CIでは署名を無効化する
      # (シミュレータ向けビルド/テストなので署名は不要)
      XCODE_FLAGS: >-
        CODE_SIGNING_ALLOWED=NO
        CODE_SIGNING_REQUIRED=NO
        CODE_SIGN_IDENTITY=""
        DEVELOPMENT_TEAM=""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Info.plist / project.pbxproj が iOS 26.5 SDK を要求しているため、
          # 対応する最新の安定版Xcodeを指定する。ランナーのプリインストール状況が
          # 変わった場合はここを調整すること。
          xcode-version: latest-stable

      - name: Show Xcode & SDK versions
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Ensure iOS Simulator runtime is installed
        run: |
          # ランナーに、選択中のXcodeが要求するiOS Simulatorランタイムが
          # 入っていないことがあるため、明示的にダウンロードしておく。
          # (すでに入っている場合は即座に完了する)
          sudo xcodebuild -runFirstLaunch
          xcodebuild -downloadPlatform iOS
          xcrun simctl list runtimes

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Pick available iOS Simulator
        id: sim
        run: |
          set -o pipefail
          # xcrun simctl list はシステム全体のランタイムを返してしまい、
          # 現在選択中のXcode/SDKでは実際にビルドできない機種を拾うことがある。
          # そのため、このproject/schemeに対して xcodebuild が
          # 「本当にビルド可能」と申告する destination だけを対象にする。
          xcodebuild -showdestinations -project "$PROJECT" -scheme "$SCHEME" 2>/dev/null \
            | tee /tmp/destinations.txt

          # 具体的なidを持つ iOS Simulator 行だけを抽出(プレースホルダーは除外)
          LINE=$(grep -E "platform:iOS Simulator" /tmp/destinations.txt | grep -v "Any iOS Simulator Device" | grep "id:" | head -1)

          if [ -z "$LINE" ]; then
            echo "::error::このschemeに対して有効なiOS Simulator destinationが見つかりませんでした。"
            echo "--- xcodebuild -showdestinations の出力 ---"
            cat /tmp/destinations.txt
            exit 1
          fi

          NAME=$(echo "$LINE" | sed -E 's/.*name:([^,}]+).*/\1/' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          OS=$(echo "$LINE" | sed -E 's/.*OS:([^,}]+).*/\1/' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "os=$OS" >> "$GITHUB_OUTPUT"
          echo "Using simulator: name=$NAME os=$OS"

      - name: Build (Debug, Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=${{ steps.sim.outputs.os }}" \
            -configuration Debug \
            $XCODE_FLAGS \
            | xcpretty

      - name: Unit & UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=${{ steps.sim.outputs.os }}" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            $XCODE_FLAGS \
            | xcpretty --report junit --output build/reports/junit.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: build/reports/junit.xml
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
          retention-days: 14
